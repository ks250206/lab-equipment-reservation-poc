# 本番相当（PoC）: Keycloak のメタデータを Postgres の keycloak DB に永続化
# （postgres_data ボリューム内。コンテナ再起動後も保持）
# 初回 postgres ボリューム作成時のみ docker/postgres/init が実行される（keycloak DB 作成）
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: device-reservation-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev_password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
