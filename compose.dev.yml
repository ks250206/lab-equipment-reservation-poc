# 開発: Keycloak は dev-file（H2）。名前付きボリュームでコンテナ再作成後もレルム等を保持。
# MinIO: 装置画像のオブジェクトストレージ（S3 互換 API :9000、コンソール :9001）。
# 本番相当は compose.prod.yml（Postgres の keycloak DB）を参照。
services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: device-reservation-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: device-reservation-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8080:8080"
    volumes:
      - keycloak_dev_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  keycloak_dev_data:
  minio_dev_data:
