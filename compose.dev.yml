# 開発: Keycloak は dev-file（H2）。名前付きボリュームでコンテナ再作成後もレルム等を保持。
# 本番相当は compose.prod.yml（Postgres の keycloak DB）を参照。
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: device-reservation-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8080:8080"
    volumes:
      - keycloak_dev_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  keycloak_dev_data:
