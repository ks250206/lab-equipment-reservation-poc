# アプリ用 PostgreSQL（全プロファイル共通）
# Keycloak は compose.dev.yml / compose.prod.yml で重ねる。
# 切替: PERSISTENCE_PROFILE=development（既定）| production（scripts/compose.sh）

services:
  postgres:
    image: postgres:16
    container_name: equipment-reservation-postgres
    environment:
      POSTGRES_DB: equipment_reservation
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d equipment_reservation"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
